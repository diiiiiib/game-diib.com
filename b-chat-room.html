<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دردشة - Game DIIB</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #682FCC;
            --accent-color: #F59E0B;
            --success-color: #22C55E;
            --error-color: #EF4444;
            --background-dark: #1A1A2E;
            --background-light: #16213E;
            --text-primary: #FFFFFF;
            --text-secondary: #A0A0A0;
            --border-color: #2A2A4A;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--background-dark);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background: var(--primary-color);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        .header-title {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: all 0.3s ease;
        }

        .header-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        /* Chat Room */
        .chat-room {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Messages Container */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Message */
        .message {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            position: relative;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.sent {
            align-self: flex-end;
            background: var(--primary-color);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.received {
            align-self: flex-start;
            background: var(--background-light);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
        }

        .message-time {
            font-size: 0.75rem;
            opacity: 0.7;
            margin-top: 4px;
        }

        /* Input Container */
        .input-container {
            display: flex;
            gap: 12px;
            padding: 20px;
            background: var(--background-light);
            box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.1);
        }

        .chat-input {
            flex: 1;
            padding: 12px 20px;
            background: var(--background-dark);
            border: 2px solid var(--border-color);
            border-radius: 24px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .chat-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(104, 47, 204, 0.1);
        }

        .send-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--primary-color);
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .send-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 12px rgba(104, 47, 204, 0.4);
        }

        /* Loading */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Error Message */
        .error-message {
            background: var(--error-color);
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            margin: 20px;
            text-align: center;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            text-align: center;
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-text {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                padding: 12px 16px;
            }

            .header-title {
                font-size: 1rem;
            }

            .message {
                max-width: 85%;
            }

            .input-container {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <button class="back-btn" id="backBtn">
                <i class="fas fa-arrow-right"></i>
            </button>
            <div>
                <div class="header-title" id="chatTitle">دردشة</div>
                <div class="user-status" id="userStatus" style="font-size: 0.85rem; opacity: 0.8;"></div>
            </div>
        </div>
        <div class="header-right">
            <button class="header-btn" id="profileBtn" title="الملف الشخصي">
                <i class="fas fa-user"></i>
            </button>
            <button class="header-btn" id="clearChatBtn" title="مسح المحادثة">
                <i class="fas fa-trash"></i>
            </button>
        </div>
    </header>

    <!-- Chat Room -->
    <div class="chat-room">
        <!-- Messages Container -->
        <div class="messages-container" id="messagesContainer">
            <div class="loading">
                <div class="spinner"></div>
            </div>
        </div>

        <!-- Input Container -->
        <div class="input-container">
            <input type="text" class="chat-input" id="chatInput" placeholder="اكتب رسالة...">
            <button class="send-btn" id="sendBtn">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js';
        import { 
            getAuth, 
            onAuthStateChanged 
        } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js';
        import { 
            getFirestore, 
            collection, 
            query, 
            where, 
            orderBy, 
            onSnapshot,
            addDoc,
            serverTimestamp,
            doc,
            getDoc
        } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js';

        // Import Firebase Configuration
        import {
            auth,
            db
        } from './b-firebase-config.js';

        // DOM Elements
        const backBtn = document.getElementById('backBtn');
        const chatTitle = document.getElementById('chatTitle');
        const userStatus = document.getElementById('userStatus');
        const profileBtn = document.getElementById('profileBtn');
        const clearChatBtn = document.getElementById('clearChatBtn');
        const messagesContainer = document.getElementById('messagesContainer');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');

        // State
        let currentUserId = null;
        let otherUserId = null;
        let chatId = null;
        let unsubscribe = null;

        // Get URL Parameters
        const urlParams = new URLSearchParams(window.location.search);
        otherUserId = urlParams.get('userId');

        // Initialize
        function init() {
            if (!otherUserId) {
                showError('لم يتم تحديد المستخدم');
                return;
            }

            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    currentUserId = user.uid;
                    await loadChat();
                } else {
                    window.location.href = 'b-login.html';
                }
            });
        }

        // Load Chat
        async function loadChat() {
            try {
                // Get other user info
                const otherUserDoc = await getDoc(doc(db, 'users', otherUserId));
                if (!otherUserDoc.exists()) {
                    showError('لم يتم العثور على المستخدم');
                    return;
                }

                const otherUser = otherUserDoc.data();
                chatTitle.textContent = otherUser.name || otherUser.displayName || 'مستخدم';
                userStatus.textContent = otherUser.status === 'online' ? 'متصل الآن' : 'غير متصل';

                // Create chat ID
                const chatIds = [currentUserId, otherUserId].sort();
                chatId = `${chatIds[0]}_${chatIds[1]}`;

                // Load messages
                loadMessages();
            } catch (error) {
                console.error('Error loading chat:', error);
                showError('حدث خطأ في تحميل المحادثة');
            }
        }

        // Load Messages
        function loadMessages() {
            if (unsubscribe) {
                unsubscribe();
            }

            const messagesRef = collection(db, 'chats', chatId, 'messages');
            const q = query(messagesRef, orderBy('timestamp', 'asc'));

            unsubscribe = onSnapshot(q, (snapshot) => {
                messagesContainer.innerHTML = '';

                if (snapshot.empty) {
                    messagesContainer.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">💬</div>
                            <p class="empty-text">ابدأ المحادثة الآن!</p>
                        </div>
                    `;
                    return;
                }

                snapshot.forEach((doc) => {
                    const message = doc.data();
                    const isSent = message.senderId === currentUserId;
                    addMessage(message.text, isSent, message.timestamp?.toDate());
                });

                // Scroll to bottom
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }, (error) => {
                console.error('Error loading messages:', error);
                showError('حدث خطأ في تحميل الرسائل');
            });
        }

        // Add Message
        function addMessage(text, isSent, timestamp = new Date()) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isSent ? 'sent' : 'received'}`;
            messageDiv.innerHTML = `
                ${text}
                <div class="message-time">${formatTime(timestamp)}</div>
            `;
            messagesContainer.appendChild(messageDiv);
        }

        // Format Time
        function formatTime(date) {
            const hours = date.getHours().toString().padStart(2, '0');
            const minutes = date.getMinutes().toString().padStart(2, '0');
            return `${hours}:${minutes}`;
        }

        // Send Message
        async function sendMessage() {
            const text = chatInput.value.trim();
            if (!text) return;

            try {
                await addDoc(collection(db, 'chats', chatId, 'messages'), {
                    text,
                    senderId: currentUserId,
                    timestamp: serverTimestamp()
                });

                chatInput.value = '';
                chatInput.focus();
            } catch (error) {
                console.error('Error sending message:', error);
                showError('حدث خطأ في إرسال الرسالة');
            }
        }

        // Show Error
        function showError(message) {
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-message';
            errorDiv.textContent = message;
            messagesContainer.insertBefore(errorDiv, messagesContainer.firstChild);
        }

        // Event Listeners
        backBtn.addEventListener('click', () => {
            window.location.href = 'b-friends.html';
        });

        profileBtn.addEventListener('click', () => {
            window.location.href = `b-profile.html?userId=${otherUserId}`;
        });

        clearChatBtn.addEventListener('click', () => {
            if (confirm('هل أنت متأكد من مسح المحادثة؟')) {
                // TODO: Implement clear chat functionality
                showError('قسم مسح المحادثة قيد التطوير');
            }
        });

        sendBtn.addEventListener('click', sendMessage);

        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Initialize App
        init();
    </script>
</body>
</html>
