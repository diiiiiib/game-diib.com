<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Game DIIB - نشر محتوى">
    <meta name="theme-color" content="#682fcc">
    <title>Game DIIB - نشر محتوى</title>
    <link rel="stylesheet" href="mobile-styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #682fcc;
            --secondary-color: #44247b;
            --accent-color: #22C55E;
            --background-dark: #0F172A;
            --background-light: #1E293B;
            --text-primary: #F8FAFC;
            --text-secondary: #94A3B8;
            --border-color: #334155;
            --success: #22C55E;
            --warning: #FACC15;
            --danger: #EF4444;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--background-dark);
            color: var(--text-primary);
            line-height: 1.6;
            padding-bottom: 70px;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            padding: 12px 16px;
            z-index: 1000;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .header-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 1.3rem;
            padding: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .header-btn:hover {
            color: var(--primary-color);
            transform: scale(1.1);
        }

        /* Main Content */
        .main-content {
            padding-top: 60px;
            max-width: 800px;
            margin: 0 auto;
        }

        /* Type Selector */
        .type-selector {
            display: flex;
            gap: 12px;
            padding: 20px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .type-selector::-webkit-scrollbar {
            display: none;
        }

        .type-btn {
            padding: 12px 24px;
            background: var(--background-light);
            border: 2px solid var(--border-color);
            border-radius: 20px;
            color: var(--text-primary);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .type-btn:hover,
        .type-btn.active {
            background: var(--primary-color);
            border-color: var(--primary-color);
            color: white;
        }

        /* Form */
        .form-section {
            background: var(--background-light);
            padding: 24px;
            margin: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .form-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--primary-color);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            background: var(--background-dark);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .form-input::placeholder {
            color: var(--text-secondary);
        }

        .form-textarea {
            width: 100%;
            padding: 14px 16px;
            background: var(--background-dark);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.3s ease;
            resize: vertical;
            min-height: 120px;
        }

        .form-textarea:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .form-select {
            width: 100%;
            padding: 14px 16px;
            background: var(--background-dark);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .form-select:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .form-button {
            width: 100%;
            padding: 14px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 12px;
        }

        .form-button:hover {
            background: var(--secondary-color);
            transform: translateY(-2px);
        }

        .form-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* File Upload */
        .file-upload {
            border: 2px dashed var(--border-color);
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .file-upload:hover {
            border-color: var(--primary-color);
            background: rgba(104, 47, 204, 0.1);
        }

        .file-upload-icon {
            font-size: 3rem;
            margin-bottom: 12px;
        }

        .file-upload-text {
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .file-upload-hint {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--background-light);
            border-top: 1px solid var(--border-color);
            padding: 8px 16px;
            display: flex;
            justify-content: space-around;
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--text-secondary);
            border: none;
            background: none;
            font-size: 0.85rem;
        }

        .nav-item.active {
            color: var(--primary-color);
        }

        .nav-item:hover {
            color: var(--primary-color);
        }

        .nav-icon {
            font-size: 1.4rem;
        }

        /* Loading */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top: 3px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <h1 class="header-title">نشر محتوى</h1>
        <div class="header-actions">
            <button class="header-btn" onclick="navigateToProfile()">👤</button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Type Selector -->
        <div class="type-selector">
            <button class="type-btn active" data-type="game">لعبة</button>
            <button class="type-btn" data-type="asset">أصل</button>
            <button class="type-btn" data-type="model">نموذج 3D</button>
        </div>

        <!-- Game Form -->
        <div class="form-section" id="gameForm">
            <h2 class="form-title">نشر لعبة جديدة</h2>

            <form id="publishGameForm">
                <div class="form-group">
                    <label class="form-label">عنوان اللعبة</label>
                    <input 
                        type="text" 
                        class="form-input" 
                        id="gameTitle"
                        placeholder="أدخل عنوان اللعبة"
                        required
                    >
                </div>

                <div class="form-group">
                    <label class="form-label">وصف اللعبة</label>
                    <textarea 
                        class="form-textarea" 
                        id="gameDescription"
                        placeholder="اكتب وصفاً تفصيلياً للعبة"
                        required
                    ></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">الفئة</label>
                    <select class="form-select" id="gameCategory" required>
                        <option value="">اختر الفئة</option>
                        <option value="action">أكشن</option>
                        <option value="adventure">مغامرات</option>
                        <option value="puzzle">ألغاز</option>
                        <option value="racing">سباقات</option>
                        <option value="sports">رياضة</option>
                        <option value="strategy">استراتيجية</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">صورة الغلاف</label>
                    <div class="file-upload" onclick="document.getElementById('gameThumbnail').click()">
                        <div class="file-upload-icon">🖼️</div>
                        <div class="file-upload-text">انقر لرفع صورة الغلاف</div>
                        <div class="file-upload-hint">PNG, JPG (حتى 5MB)</div>
                    </div>
                    <input type="file" id="gameThumbnail" accept="image/*" style="display: none;">
                </div>

                <div class="form-group">
                    <label class="form-label">ملف اللعبة</label>
                    <div class="file-upload" onclick="document.getElementById('gameFile').click()">
                        <div class="file-upload-icon">🎮</div>
                        <div class="file-upload-text">انقر لرفع ملف اللعبة</div>
                        <div class="file-upload-hint">ZIP (حتى 100MB)</div>
                    </div>
                    <input type="file" id="gameFile" accept=".zip" style="display: none;">
                </div>

                <div class="form-group">
                    <label class="form-label">السعر (DIIB)</label>
                    <input 
                        type="number" 
                        class="form-input" 
                        id="gamePrice"
                        placeholder="0 للمجان"
                        min="0"
                        required
                    >
                </div>

                <button type="submit" class="form-button" id="publishGameBtn">نشر اللعبة</button>
            </form>
        </div>

        <!-- Asset Form (Hidden by default) -->
        <div class="form-section" id="assetForm" style="display: none;">
            <h2 class="form-title">نشر أصل جديد</h2>

            <form id="publishAssetForm">
                <div class="form-group">
                    <label class="form-label">عنوان الأصل</label>
                    <input 
                        type="text" 
                        class="form-input" 
                        id="assetTitle"
                        placeholder="أدخل عنوان الأصل"
                        required
                    >
                </div>

                <div class="form-group">
                    <label class="form-label">وصف الأصل</label>
                    <textarea 
                        class="form-textarea" 
                        id="assetDescription"
                        placeholder="اكتب وصفاً تفصيلياً للأصل"
                        required
                    ></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">الفئة</label>
                    <select class="form-select" id="assetCategory" required>
                        <option value="">اختر الفئة</option>
                        <option value="3d-models">نماذج 3D</option>
                        <option value="2d-sprites">رسومات 2D</option>
                        <option value="textures">قوامش</option>
                        <option value="audio">مؤثرات صوتية</option>
                        <option value="music">موسيقى</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">صورة المعاينة</label>
                    <div class="file-upload" onclick="document.getElementById('assetThumbnail').click()">
                        <div class="file-upload-icon">🖼️</div>
                        <div class="file-upload-text">انقر لرفع صورة المعاينة</div>
                        <div class="file-upload-hint">PNG, JPG (حتى 5MB)</div>
                    </div>
                    <input type="file" id="assetThumbnail" accept="image/*" style="display: none;">
                </div>

                <div class="form-group">
                    <label class="form-label">ملف الأصل</label>
                    <div class="file-upload" onclick="document.getElementById('assetFile').click()">
                        <div class="file-upload-icon">📦</div>
                        <div class="file-upload-text">انقر لرفع ملف الأصل</div>
                        <div class="file-upload-hint">ZIP, OBJ, FBX (حتى 100MB)</div>
                    </div>
                    <input type="file" id="assetFile" accept=".zip,.obj,.fbx" style="display: none;">
                </div>

                <div class="form-group">
                    <label class="form-label">السعر (DIIB)</label>
                    <input 
                        type="number" 
                        class="form-input" 
                        id="assetPrice"
                        placeholder="0 للمجان"
                        min="0"
                        required
                    >
                </div>

                <button type="submit" class="form-button" id="publishAssetBtn">نشر الأصل</button>
            </form>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="b-profile.html" class="nav-item">
            <span class="nav-icon">🏠</span>
            <span>الرئيسية</span>
        </a>
        <a href="b-analytics.html" class="nav-item">
            <span class="nav-icon">📊</span>
            <span>التحليلات</span>
        </a>
        <a href="b-publish.html" class="nav-item active">
            <span class="nav-icon">🚀</span>
            <span>النشر</span>
        </a>
        <a href="b-earnings.html" class="nav-item">
            <span class="nav-icon">💰</span>
            <span>أرباحي</span>
        </a>
        <a href="b-notifications.html" class="nav-item">
            <span class="nav-icon">🔔</span>
            <span>المستجدات</span>
        </a>
    </nav>


    <!-- Import Firebase Config -->
    <script type="module" src="b-firebase-config.js"></script>

    <!-- Import Auth Functions -->
    <script type="module" src="b-auth.js"></script>

    <!-- Import API Functions -->
    <script type="module" src="b-api.js"></script>

    <!-- Import Common Functions -->
    <script type="module" src="b-common.js"></script>

    <script type="module">
        import { createGame, createAsset, uploadFile } from './b-api.js';
        import { showLoading, hideLoading, showError, showSuccess, getCurrentUser } from './b-common.js';

        let currentType = 'game';

        // Type Selection
        document.querySelectorAll('.type-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentType = btn.dataset.type;
                toggleForms();
            });
        });

        // Toggle Forms
        function toggleForms() {
            const gameForm = document.getElementById('gameForm');
            const assetForm = document.getElementById('assetForm');

            if (currentType === 'game') {
                gameForm.style.display = 'block';
                assetForm.style.display = 'none';
            } else {
                gameForm.style.display = 'none';
                assetForm.style.display = 'block';
            }
        }

        // Publish Game
        document.getElementById('publishGameForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const user = await new Promise((resolve) => {
                const unsubscribe = onAuthStateChanged(auth, (user) => {
                    unsubscribe();
                    resolve(user);
                });
            });

            if (!user) {
                showError('يجب تسجيل الدخول لنشر المحتوى');
                navigateToLogin();
                return;
            }

            const title = document.getElementById('gameTitle').value.trim();
            const description = document.getElementById('gameDescription').value.trim();
            const category = document.getElementById('gameCategory').value;
            const price = parseFloat(document.getElementById('gamePrice').value) || 0;
            const thumbnailFile = document.getElementById('gameThumbnail').files[0];
            const gameFile = document.getElementById('gameFile').files[0];

            if (!title || !description || !category) {
                showError('يرجى ملء جميع الحقول المطلوبة');
                return;
            }

            if (!thumbnailFile || !gameFile) {
                showError('يرجى رفع صورة الغلاف وملف اللعبة');
                return;
            }

            // Validate thumbnail file
            if (thumbnailFile.size > 5 * 1024 * 1024) { // 5MB
                showError('حجم صورة الغلاف يجب أن يكون أقل من 5MB');
                return;
            }

            if (!thumbnailFile.type.startsWith('image/')) {
                showError('يجب أن تكون صورة الغلاف من نوع صورة');
                return;
            }

            // Validate game file
            if (gameFile.size > 100 * 1024 * 1024) { // 100MB
                showError('حجم ملف اللعبة يجب أن يكون أقل من 100MB');
                return;
            }

            if (gameFile.type !== 'application/zip' && !gameFile.name.endsWith('.zip')) {
                showError('يجب أن يكون ملف اللعبة بتنسيق ZIP');
                return;
            }

            showLoading();

            try {
                // Upload files
                const thumbnailUrl = await uploadFile(thumbnailFile, `games/images/${user.uid}/${Date.now()}`);
                const gameUrl = await uploadFile(gameFile, `games/files/${user.uid}/${Date.now()}`);

                // Create game in database
                const gameData = {
                    title,
                    description,
                    category,
                    thumbnail: thumbnailUrl,
                    gameUrl,
                    price,
                    developerId: user.uid,
                    tags: []
                };

                await createGame(gameData);
                showSuccess('تم نشر اللعبة بنجاح!');

                // Reset form
                document.getElementById('publishGameForm').reset();
            } catch (error) {
                console.error('Error publishing game:', error);
                showError('حدث خطأ في نشر اللعبة');
            } finally {
                hideLoading();
            }
        });

        // Publish Asset
        document.getElementById('publishAssetForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const user = getCurrentUser();
            if (!user) {
                showError('يجب تسجيل الدخول لنشر المحتوى');
                navigateToLogin();
                return;
            }

            const title = document.getElementById('assetTitle').value.trim();
            const description = document.getElementById('assetDescription').value.trim();
            const category = document.getElementById('assetCategory').value;
            const price = parseFloat(document.getElementById('assetPrice').value) || 0;
            const thumbnailFile = document.getElementById('assetThumbnail').files[0];
            const assetFile = document.getElementById('assetFile').files[0];

            if (!title || !description || !category) {
                showError('يرجى ملء جميع الحقول المطلوبة');
                return;
            }

            if (!thumbnailFile || !assetFile) {
                showError('يرجى رفع صورة المعاينة وملف الأصل');
                return;
            }

            showLoading();

            try {
                // Upload files
                const thumbnailUrl = await uploadFile(thumbnailFile, `assets/thumbnails/${user.uid}/${Date.now()}`);
                const assetUrl = await uploadFile(assetFile, `assets/files/${user.uid}/${Date.now()}`);

                // Create asset in database
                const assetData = {
                    title,
                    description,
                    category,
                    thumbnail: thumbnailUrl,
                    assetUrl,
                    price,
                    developerId: user.uid,
                    tags: []
                };

                await createAsset(assetData);
                showSuccess('تم نشر الأصل بنجاح!');

                // Reset form
                document.getElementById('publishAssetForm').reset();
            } catch (error) {
                console.error('Error publishing asset:', error);
                showError('حدث خطأ في نشر الأصل');
            } finally {
                hideLoading();
            }
        });
    </script>
</body>
</html>
