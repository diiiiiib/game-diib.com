<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Game DIIB - إنشاء حساب جديد">
    <meta name="theme-color" content="#682fcc">
    <title>Game DIIB - إنشاء حساب</title>
    <link rel="stylesheet" href="mobile-styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #682fcc;
            --secondary-color: #44247b;
            --accent-color: #22C55E;
            --background-dark: #0F172A;
            --background-light: #1E293B;
            --text-primary: #F8FAFC;
            --text-secondary: #94A3B8;
            --border-color: #334155;
            --success: #22C55E;
            --warning: #FACC15;
            --danger: #EF4444;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--background-dark);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--primary-color);
        }

        .logo-icon {
            font-size: 1.8rem;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Register Container */
        .register-container {
            width: 100%;
            max-width: 400px;
            background: var(--background-light);
            border-radius: 16px;
            padding: 32px 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .register-title {
            font-size: 1.8rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
            color: var(--primary-color);
        }

        .register-subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 32px;
        }

        /* Form */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            background: var(--background-dark);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .form-input::placeholder {
            color: var(--text-secondary);
        }

        .form-select {
            width: 100%;
            padding: 14px 16px;
            background: var(--background-dark);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .form-select:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .form-button {
            width: 100%;
            padding: 14px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 16px;
        }

        .form-button:hover {
            background: var(--secondary-color);
            transform: translateY(-2px);
        }

        .form-button:active {
            transform: translateY(0);
        }

        .form-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Social Login */
        .social-login {
            margin-top: 24px;
            text-align: center;
        }

        .social-divider {
            display: flex;
            align-items: center;
            margin-bottom: 16px;
            color: var(--text-secondary);
        }

        .social-divider::before,
        .social-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        .social-divider span {
            padding: 0 16px;
            font-size: 0.9rem;
        }

        .social-btn {
            width: 100%;
            padding: 14px;
            background: var(--background-dark);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .social-btn:hover {
            border-color: var(--primary-color);
            background: rgba(104, 47, 204, 0.1);
        }

        /* Links */
        .form-links {
            display: flex;
            justify-content: center;
            margin-top: 16px;
            font-size: 0.9rem;
        }

        .form-link {
            color: var(--primary-color);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .form-link:hover {
            color: var(--secondary-color);
        }

        /* Error Message */
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            text-align: center;
            font-size: 0.9rem;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        /* Success Message */
        .success-message {
            background: rgba(34, 197, 94, 0.1);
            color: var(--success);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            text-align: center;
            font-size: 0.9rem;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        /* Loading Spinner */
        .loading {
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .loading.show {
            display: flex;
        }

        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid var(--border-color);
            border-top: 3px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Password Strength */
        .password-strength {
            margin-top: 8px;
            display: flex;
            gap: 4px;
        }

        .strength-bar {
            flex: 1;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            transition: background 0.3s ease;
        }

        .strength-bar.weak {
            background: var(--danger);
        }

        .strength-bar.medium {
            background: var(--warning);
        }

        .strength-bar.strong {
            background: var(--success);
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="logo">
            <span class="logo-icon">🎮</span>
            <span>Game DIIB</span>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Register Container -->
        <div class="register-container">
            <h1 class="register-title">إنشاء حساب جديد</h1>
            <p class="register-subtitle">انضم إلى مجتمع المطورين والمصممين</p>

            <!-- Error Message -->
            <div id="errorMessage" class="error-message"></div>

            <!-- Success Message -->
            <div id="successMessage" class="success-message"></div>

            <!-- Register Form -->
            <form id="registerForm">
                <div class="form-group">
                    <label class="form-label" for="name">الاسم الكامل</label>
                    <input 
                        type="text" 
                        id="name" 
                        class="form-input" 
                        placeholder="أدخل اسمك الكامل"
                        required
                    >
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">البريد الإلكتروني</label>
                    <input 
                        type="email" 
                        id="email" 
                        class="form-input" 
                        placeholder="example@email.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label class="form-label" for="phone">رقم الهاتف</label>
                    <input 
                        type="tel" 
                        id="phone" 
                        class="form-input" 
                        placeholder="+966 XXXXXXXXXX"
                        required
                    >
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">كلمة المرور</label>
                    <input 
                        type="password" 
                        id="password" 
                        class="form-input" 
                        placeholder="•••••••••"
                        required
                    >
                    <div class="password-strength">
                        <div class="strength-bar" id="strength1"></div>
                        <div class="strength-bar" id="strength2"></div>
                        <div class="strength-bar" id="strength3"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="confirmPassword">تأكيد كلمة المرور</label>
                    <input 
                        type="password" 
                        id="confirmPassword" 
                        class="form-input" 
                        placeholder="•••••••••"
                        required
                    >
                </div>

                <div class="form-group">
                    <label class="form-label" for="role">نوع الحساب</label>
                    <select id="role" class="form-select" required>
                        <option value="player">لاعب</option>
                        <option value="developer">مطور ألعاب</option>
                        <option value="designer">مصمم أصول</option>
                    </select>
                </div>

                <button type="submit" class="form-button" id="registerButton">
                    إنشاء الحساب
                </button>

                <!-- Loading -->
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                </div>
            </form>

            <!-- Social Login -->
            <div class="social-login">
                <div class="social-divider">
                    <span>أو</span>
                </div>
                <button type="button" class="social-btn" id="googleLogin">
                    <span>🔵</span>
                    <span>التسجيل بـ Google</span>
                </button>
            </div>

            <!-- Links -->
            <div class="form-links">
                <span>لديك حساب بالفعل؟</span>
                <a href="b-login.html" class="form-link">تسجيل الدخول</a>
            </div>
        </div>
    </main>

    <!-- Import Firebase Config -->
    <script type="module" src="b-firebase-config.js"></script>

    <!-- Import Auth Functions -->
    <script type="module" src="b-auth.js"></script>

    <!-- Import Common Functions -->
    <script type="module" src="b-common.js"></script>

    <script type="module">
        import { registerUser, loginWithGoogle } from './b-auth.js';
        import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js';
        import { auth } from './b-firebase-config.js';

        // Form Elements
        const registerForm = document.getElementById('registerForm');
        const nameInput = document.getElementById('name');
        const emailInput = document.getElementById('email');
        const phoneInput = document.getElementById('phone');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const roleSelect = document.getElementById('role');
        const registerButton = document.getElementById('registerButton');
        const googleLoginButton = document.getElementById('googleLogin');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const loading = document.getElementById('loading');

        // Password Strength Indicators
        const strength1 = document.getElementById('strength1');
        const strength2 = document.getElementById('strength2');
        const strength3 = document.getElementById('strength3');

        // Show/Hide Loading
        function showLoading(show) {
            if (show) {
                loading.classList.add('show');
                registerButton.disabled = true;
                googleLoginButton.disabled = true;
            } else {
                loading.classList.remove('show');
                registerButton.disabled = false;
                googleLoginButton.disabled = false;
            }
        }

        // Show Error
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
            successMessage.classList.remove('show');
            setTimeout(() => {
                errorMessage.classList.remove('show');
            }, 5000);
        }

        // Show Success
        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.classList.add('show');
            errorMessage.classList.remove('show');
            setTimeout(() => {
                successMessage.classList.remove('show');
            }, 5000);
        }

        // Check Password Strength
        passwordInput.addEventListener('input', () => {
            const password = passwordInput.value;
            let strength = 0;

            if (password.length >= 6) strength++;
            if (password.length >= 8) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;

            if (strength <= 2) {
                strength1.classList.add('weak');
                strength2.classList.remove('medium', 'strong');
                strength3.classList.remove('medium', 'strong');
            } else if (strength <= 4) {
                strength1.classList.add('medium');
                strength2.classList.add('medium');
                strength3.classList.remove('medium', 'strong');
            } else {
                strength1.classList.add('strong');
                strength2.classList.add('strong');
                strength3.classList.add('strong');
            }
        });

        // Register Form Handler
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = nameInput.value.trim();
            const email = emailInput.value.trim();
            const phone = phoneInput.value.trim();
            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;
            const role = roleSelect.value;

            // Validation
            if (!name || !email || !phone || !password || !confirmPassword || !role) {
                showError('جميع الحقول مطلوبة');
                return;
            }

            if (password.length < 6) {
                showError('كلمة المرور يجب أن تكون 6 أحرف على الأقل');
                return;
            }

            if (password !== confirmPassword) {
                showError('كلمة المرور غير متطابقة');
                return;
            }

            showLoading(true);

            try {
                const result = await registerUser(name, email, password, phone, role);
                if (result.success) {
                    showSuccess('تم إنشاء الحساب بنجاح! يرجى التحقق من بريدك الإلكتروني');

                    // Redirect to login after 2 seconds
                    setTimeout(() => {
                        window.location.href = 'b-login.html';
                    }, 2000);
                } else {
                    showError(result.error);
                }
            } catch (error) {
                showError('حدث خطأ في إنشاء الحساب');
                console.error(error);
            } finally {
                showLoading(false);
            }
        });

        // Google Login Handler
        googleLoginButton.addEventListener('click', async () => {
            showLoading(true);

            try {
                const result = await loginWithGoogle();
                if (result.success) {
                    showSuccess('تم تسجيل الدخول بنجاح!');

                    // Redirect to home after 1 second
                    setTimeout(() => {
                        window.location.href = 'b-index.html';
                    }, 1000);
                } else {
                    showError(result.error);
                }
            } catch (error) {
                showError('حدث خطأ في تسجيل الدخول بـ Google');
                console.error(error);
            } finally {
                showLoading(false);
            }
        });

        // Check if user is already logged in
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // User is already logged in, redirect to home
                window.location.href = 'b-index.html';
            }
        });
    </script>
</body>
</html>
