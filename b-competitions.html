<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Game DIIB - المسابقات">
    <meta name="theme-color" content="#682fcc">
    <title>Game DIIB - المسابقات</title>
    <link rel="stylesheet" href="mobile-styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #682fcc;
            --secondary-color: #44247b;
            --accent-color: #22C55E;
            --background-dark: #0F172A;
            --background-light: #1E293B;
            --text-primary: #F8FAFC;
            --text-secondary: #94A3B8;
            --border-color: #334155;
            --success: #22C55E;
            --warning: #FACC15;
            --danger: #EF4444;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--background-dark);
            color: var(--text-primary);
            line-height: 1.6;
            padding-bottom: 70px;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            padding: 12px 16px;
            z-index: 1000;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .header-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 1.3rem;
            padding: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .header-btn:hover {
            color: var(--primary-color);
            transform: scale(1.1);
        }

        /* Main Content */
        .main-content {
            padding-top: 60px;
            max-width: 800px;
            margin: 0 auto;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 8px;
            padding: 20px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .tabs::-webkit-scrollbar {
            display: none;
        }

        .tab {
            padding: 10px 20px;
            background: var(--background-light);
            border: 2px solid var(--border-color);
            border-radius: 20px;
            color: var(--text-primary);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .tab:hover,
        .tab.active {
            background: var(--primary-color);
            border-color: var(--primary-color);
            color: white;
        }

        /* Competition Card */
        .competition-card {
            background: var(--background-light);
            margin: 20px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .competition-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
        }

        .competition-banner {
            height: 180px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }

        .competition-info {
            padding: 20px;
        }

        .competition-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .competition-description {
            color: var(--text-secondary);
            margin-bottom: 16px;
            line-height: 1.6;
        }

        .competition-meta {
            display: flex;
            gap: 20px;
            margin-bottom: 16px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .competition-meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .competition-prize {
            background: rgba(34, 197, 94, 0.1);
            color: var(--accent-color);
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            margin-bottom: 16px;
            display: inline-block;
        }

        .competition-status {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .status-active {
            background: rgba(34, 197, 94, 0.1);
            color: var(--success);
        }

        .status-upcoming {
            background: rgba(250, 204, 21, 0.1);
            color: var(--warning);
        }

        .status-completed {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--background-light);
            border-top: 1px solid var(--border-color);
            padding: 8px 16px;
            display: flex;
            justify-content: space-around;
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--text-secondary);
            border: none;
            background: none;
            font-size: 0.85rem;
        }

        .nav-item.active {
            color: var(--primary-color);
        }

        .nav-item:hover {
            color: var(--primary-color);
        }

        .nav-icon {
            font-size: 1.4rem;
        }

        /* Loading */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top: 3px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .empty-text {
            font-size: 1.1rem;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <h1 class="header-title">المسابقات</h1>
        <div class="header-actions">
            <button class="header-btn" onclick="navigateToSearch()">🔍</button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" data-status="all">الكل</button>
            <button class="tab" data-status="active">نشطة</button>
            <button class="tab" data-status="upcoming">قادمة</button>
            <button class="tab" data-status="completed">منتهية</button>
        </div>

        <!-- Competitions List -->
        <div id="competitionsList">
            <!-- Loading -->
            <div class="loading">
                <div class="spinner"></div>
            </div>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <button class="nav-item" onclick="navigateToIndex()">
            <span class="nav-icon">🏠</span>
            <span>الرئيسية</span>
        </button>
        <button class="nav-item" onclick="navigateToStore()">
            <span class="nav-icon">🏪</span>
            <span>المتجر</span>
        </button>
        <button class="nav-item active" onclick="navigateToCompetitions()">
            <span class="nav-icon">🏆</span>
            <span>المسابقات</span>
        </button>
        <button class="nav-item" onclick="navigateToCommunity()">
            <span class="nav-icon">🌐</span>
            <span>المجتمع</span>
        </button>
        <button class="nav-item" onclick="navigateToDashboard()">
            <span class="nav-icon">👤</span>
            <span>حسابي</span>
        </button>
    </nav>

    <!-- Import Firebase Config -->
    <script type="module" src="b-firebase-config.js"></script>

    <!-- Import API Functions -->
    <script type="module" src="b-api.js"></script>

    <!-- Import Common Functions -->
    <script type="module" src="b-common.js"></script>

    <script type="module">
        import { getCompetitions, getCompetitionById } from './b-api.js';
        import { showLoading, hideLoading, calculateDaysLeft, formatNumber } from './b-common.js';

        let currentStatus = 'all';
        let allCompetitions = [];

        // Load Competitions
        async function loadCompetitions() {
            showLoading();
            try {
                const competitionsList = document.getElementById('competitionsList');
                competitionsList.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

                allCompetitions = await getCompetitions();

                // Filter and display competitions
                filterAndDisplayCompetitions();
            } catch (error) {
                console.error('Error loading competitions:', error);
                showError('حدث خطأ في تحميل المسابقات');
            } finally {
                hideLoading();
            }
        }

        // Filter and Display Competitions
        function filterAndDisplayCompetitions() {
            const competitionsList = document.getElementById('competitionsList');
            competitionsList.innerHTML = '';

            // Filter by status
            let filteredCompetitions = allCompetitions;
            if (currentStatus !== 'all') {
                filteredCompetitions = allCompetitions.filter(comp => 
                    comp.status === currentStatus
                );
            }

            if (filteredCompetitions.length === 0) {
                competitionsList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🏆</div>
                        <p class="empty-text">لا توجد مسابقات حالياً</p>
                    </div>
                `;
                return;
            }

            // Display competitions
            filteredCompetitions.forEach(competition => {
                const card = createCompetitionCard(competition);
                competitionsList.appendChild(card);
            });
        }

        // Create Competition Card
        function createCompetitionCard(competition) {
            const card = document.createElement('div');
            card.className = 'competition-card';
            card.onclick = () => navigateToCompetitionDetails(competition.id);

            const daysLeft = calculateDaysLeft(competition.endDate);
            const statusClass = `status-${competition.status}`;
            const statusText = {
                'active': 'نشطة',
                'upcoming': 'قادمة',
                'completed': 'منتهية'
            }[competition.status] || competition.status;

            card.innerHTML = `
                <div class="competition-banner">🏆</div>
                <div class="competition-info">
                    <span class="competition-status ${statusClass}">${statusText}</span>
                    <h3 class="competition-title">${competition.title}</h3>
                    <p class="competition-description">${competition.description}</p>
                    <div class="competition-prize">
                        💰 الجائزة: ${formatNumber(competition.prize)} DIIB
                    </div>
                    <div class="competition-meta">
                        <div class="competition-meta-item">
                            <span>📅</span>
                            <span>متبقي ${daysLeft} يوم</span>
                        </div>
                        <div class="competition-meta-item">
                            <span>👥</span>
                            <span>${formatNumber(competition.participants?.length || 0)} مشارك</span>
                        </div>
                    </div>
                </div>
            `;

            return card;
        }

        // Tab Click Handler
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentStatus = tab.dataset.status;
                filterAndDisplayCompetitions();
            });
        });

        // Load competitions on page load
        loadCompetitions();
    </script>
</body>
</html>
