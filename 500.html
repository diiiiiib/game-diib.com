<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="خطأ في الخادم - Game DIIB">
    <meta name="theme-color" content="#682fcc">
    <title>خطأ في الخادم - Game DIIB</title>
    <link rel="stylesheet" href="mobile-styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #682fcc;
            --secondary-color: #44247b;
            --background-dark: #0F172A;
            --background-light: #1E293B;
            --text-primary: #F8FAFC;
            --text-secondary: #94A3B8;
            --danger: #EF4444;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--background-dark);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .error-container {
            max-width: 500px;
        }

        .error-code {
            font-size: 8rem;
            font-weight: 800;
            color: var(--danger);
            margin-bottom: 20px;
            opacity: 0.8;
        }

        .error-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .error-message {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .error-actions {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .error-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: var(--primary-color);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .error-btn:hover {
            background: var(--secondary-color);
            transform: translateY(-2px);
        }

        .error-details {
            background: var(--background-light);
            border-radius: 8px;
            padding: 20px;
            margin-top: 32px;
            text-align: left;
            border: 1px solid var(--danger);
        }

        .error-details h3 {
            color: var(--danger);
            margin-bottom: 12px;
        }

        .error-details p {
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">500</div>
        <h1 class="error-title">خطأ في الخادم</h1>
        <p class="error-message">
            حدث خطأ فني في الخادم. نحن نعمل على إصلاحه في أسرع وقت ممكن.
            يرجى المحاولة مرة أخرى لاحقاً.
        </p>

        <div class="error-actions">
            <a href="/" class="error-btn">
                🔄 إعادة المحاولة
            </a>
            <a href="mailto:support@gamediib.com" class="error-btn">
                📧 التواصل مع الدعم
            </a>
        </div>

        <div class="error-details">
            <h3>معلومات الخطأ</h3>
            <p><strong>الرمز:</strong> 500 Internal Server Error</p>
            <p><strong>الوقت:</strong> <span id="error-time"></span></p>
            <p><strong>المسار:</strong> <span id="error-path"></span></p>
            <p><strong>المتصفح:</strong> <span id="error-browser"></span></p>
        </div>
    </div>

    <script>
        // Fill error details
        document.getElementById('error-time').textContent = new Date().toLocaleString('ar-SA');
        document.getElementById('error-path').textContent = window.location.pathname;
        document.getElementById('error-browser').textContent = navigator.userAgent.split(' ').pop();

        // Auto refresh after 30 seconds
        setTimeout(() => {
            window.location.reload();
        }, 30000);
    </script>
</body>
</html>
