<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Game DIIB - الإشعارات">
    <meta name="theme-color" content="#682fcc">
    <title>Game DIIB - الإشعارات</title>
    <link rel="stylesheet" href="mobile-styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #682fcc;
            --secondary-color: #44247b;
            --accent-color: #22C55E;
            --background-dark: #0F172A;
            --background-light: #1E293B;
            --text-primary: #F8FAFC;
            --text-secondary: #94A3B8;
            --border-color: #334155;
            --success: #22C55E;
            --warning: #FACC15;
            --danger: #EF4444;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--background-dark);
            color: var(--text-primary);
            line-height: 1.6;
            padding-bottom: 70px;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            padding: 12px 16px;
            z-index: 1000;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .mark-all-read-btn {
            padding: 8px 16px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .mark-all-read-btn:hover {
            background: var(--secondary-color);
        }

        /* Main Content */
        .main-content {
            padding-top: 60px;
            max-width: 800px;
            margin: 0 auto;
        }

        /* Notification Card */
        .notification-card {
            background: var(--background-light);
            padding: 16px;
            margin: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: flex-start;
            gap: 12px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .notification-card:hover {
            transform: translateX(-4px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
        }

        .notification-card.unread {
            border-right: 4px solid var(--primary-color);
        }

        .notification-icon {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            background: var(--primary-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .notification-content {
            flex: 1;
        }

        .notification-title {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .notification-message {
            color: var(--text-secondary);
            margin-bottom: 8px;
            line-height: 1.6;
        }

        .notification-time {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--background-light);
            border-top: 1px solid var(--border-color);
            padding: 8px 16px;
            display: flex;
            justify-content: space-around;
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--text-secondary);
            border: none;
            background: none;
            font-size: 0.85rem;
        }

        .nav-item.active {
            color: var(--primary-color);
        }

        .nav-item:hover {
            color: var(--primary-color);
        }

        .nav-icon {
            font-size: 1.4rem;
        }

        /* Loading */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top: 3px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .empty-text {
            font-size: 1.1rem;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <h1 class="header-title">الإشعارات</h1>
        <div class="header-actions">
            <button class="mark-all-read-btn" onclick="markAllAsRead()">تحديد الكل كمقروء</button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content" id="notificationsList">
        <!-- Loading -->
        <div class="loading">
            <div class="spinner"></div>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="b-profile.html" class="nav-item">
            <span class="nav-icon">🏠</span>
            <span>الرئيسية</span>
        </a>
        <a href="b-analytics.html" class="nav-item">
            <span class="nav-icon">📊</span>
            <span>التحليلات</span>
        </a>
        <a href="b-publish.html" class="nav-item active">
            <span class="nav-icon">🚀</span>
            <span>النشر</span>
        </a>
        <a href="b-earnings.html" class="nav-item">
            <span class="nav-icon">💰</span>
            <span>أرباحي</span>
        </a>
        <a href="b-notifications.html" class="nav-item">
            <span class="nav-icon">🔔</span>
            <span>المستجدات</span>
        </a>
    </nav>


    <!-- Import Firebase Config -->
    <script type="module" src="b-firebase-config.js"></script>

    <!-- Import API Functions -->
    <script type="module" src="b-api.js"></script>

    <!-- Import Common Functions -->
    <script type="module" src="b-common.js"></script>

    <script type="module">
        import { getUserNotifications, markNotificationAsRead } from './b-api.js';
        import { showLoading, hideLoading, getTimeAgo, showError, navigateToLogin } from './b-common.js';
        import { auth, onAuthStateChanged } from './b-auth.js';

        let allNotifications = [];

        // Load Notifications
        async function loadNotifications() {
            showLoading();
            try {
                const notificationsList = document.getElementById('notificationsList');

                // Get current user
                const user = await new Promise((resolve) => {
                    const unsubscribe = onAuthStateChanged(auth, (user) => {
                        unsubscribe();
                        resolve(user);
                    });
                });

                if (!user) {
                    navigateToLogin();
                    return;
                }

                // Load notifications from database
                allNotifications = await getUserNotifications(user.uid);
                displayNotifications(allNotifications);
            } catch (error) {
                console.error('Error loading notifications:', error);
                showError('حدث خطأ في تحميل الإشعارات');
            } finally {
                hideLoading();
            }
        }

        // Display Notifications
        function displayNotifications(notifications) {
            const notificationsList = document.getElementById('notificationsList');
            notificationsList.innerHTML = '';

            if (notifications.length === 0) {
                notificationsList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🔔</div>
                        <p class="empty-text">لا توجد إشعارات حالياً</p>
                    </div>
                `;
                return;
            }

            notifications.forEach(notification => {
                const card = createNotificationCard(notification);
                notificationsList.appendChild(card);
            });
        }

        // Create Notification Card
        function createNotificationCard(notification) {
            const card = document.createElement('div');
            card.className = `notification-card ${!notification.read ? 'unread' : ''}`;
            card.onclick = async () => {
                if (!notification.read) {
                    await markNotificationAsRead(notification.id);
                    card.classList.remove('unread');
                }
                // Navigate to related content
                if (notification.link) {
                    window.location.href = notification.link;
                }
            };

            const icon = getNotificationIcon(notification.type);

            card.innerHTML = `
                <div class="notification-icon">${icon}</div>
                <div class="notification-content">
                    <div class="notification-title">${notification.title}</div>
                    <div class="notification-message">${notification.message}</div>
                    <div class="notification-time">${getTimeAgo(notification.timestamp)}</div>
                </div>
            `;

            return card;
        }

        // Get Notification Icon
        function getNotificationIcon(type) {
            const icons = {
                'game': '🎮',
                'asset': '🎨',
                'competition': '🏆',
                'comment': '💬',
                'like': '❤️',
                'achievement': '⭐',
                'system': '🔔',
                'earning': '💰'
            };
            return icons[type] || '🔔';
        }

        // Mark All as Read
        async function markAllAsRead() {
            try {
                const user = getCurrentUser();
                if (!user) return;

                for (const notification of allNotifications) {
                    if (!notification.read) {
                        await markNotificationAsRead(notification.id);
                    }
                }

                // Refresh notifications
                await loadNotifications();
                showSuccess('تم تحديد جميع الإشعارات كمقروءة');
            } catch (error) {
                console.error('Error marking notifications as read:', error);
                showError('حدث خطأ في تحديث الإشعارات');
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadNotifications();
        });
    </script>
</body>
</html>
