<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Game DIIB - البحث">
    <meta name="theme-color" content="#682fcc">
    <title>Game DIIB - البحث</title>
    <link rel="stylesheet" href="mobile-styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #682fcc;
            --secondary-color: #44247b;
            --accent-color: #22C55E;
            --background-dark: #0F172A;
            --background-light: #1E293B;
            --text-primary: #F8FAFC;
            --text-secondary: #94A3B8;
            --border-color: #334155;
            --success: #22C55E;
            --warning: #FACC15;
            --danger: #EF4444;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--background-dark);
            color: var(--text-primary);
            line-height: 1.6;
            padding-bottom: 70px;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            padding: 12px 16px;
            z-index: 1000;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .search-bar {
            flex: 1;
            padding: 12px 16px;
            background: var(--background-light);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .search-bar:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .search-bar::placeholder {
            color: var(--text-secondary);
        }

        .search-btn {
            padding: 12px 20px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .search-btn:hover {
            background: var(--secondary-color);
            transform: translateY(-2px);
        }

        /* Main Content */
        .main-content {
            padding-top: 80px;
            max-width: 800px;
            margin: 0 auto;
        }

        /* Filters */
        .filters {
            display: flex;
            gap: 8px;
            padding: 20px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .filters::-webkit-scrollbar {
            display: none;
        }

        .filter-btn {
            padding: 10px 20px;
            background: var(--background-light);
            border: 2px solid var(--border-color);
            border-radius: 20px;
            color: var(--text-primary);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: var(--primary-color);
            border-color: var(--primary-color);
            color: white;
        }

        /* Results Grid */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 16px;
            padding: 20px;
        }

        .result-card {
            background: var(--background-light);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .result-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
        }

        .result-image {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }

        .result-info {
            padding: 12px;
        }

        .result-type {
            display: inline-block;
            padding: 4px 12px;
            background: var(--primary-color);
            border-radius: 12px;
            font-size: 0.75rem;
            color: white;
            margin-bottom: 8px;
        }

        .result-title {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 8px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .result-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--background-light);
            border-top: 1px solid var(--border-color);
            padding: 8px 16px;
            display: flex;
            justify-content: space-around;
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--text-secondary);
            border: none;
            background: none;
            font-size: 0.85rem;
        }

        .nav-item.active {
            color: var(--primary-color);
        }

        .nav-item:hover {
            color: var(--primary-color);
        }

        .nav-icon {
            font-size: 1.4rem;
        }

        /* Loading */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top: 3px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .empty-text {
            font-size: 1.1rem;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <input 
            type="text" 
            class="search-bar" 
            id="searchBar"
            placeholder="ابحث عن ألعاب وأصول ومستخدمين..."
        >
        <button class="search-btn" onclick="performSearch()">بحث</button>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Filters -->
        <div class="filters">
            <button class="filter-btn active" data-filter="all">الكل</button>
            <button class="filter-btn" data-filter="games">ألعاب</button>
            <button class="filter-btn" data-filter="assets">أصول</button>
            <button class="filter-btn" data-filter="users">مستخدمين</button>
        </div>

        <!-- Results Grid -->
        <div class="results-grid" id="resultsGrid">
            <!-- Results will be loaded dynamically -->
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <button class="nav-item" onclick="navigateToIndex()">
            <span class="nav-icon">🏠</span>
            <span>الرئيسية</span>
        </button>
        <button class="nav-item" onclick="navigateToStore()">
            <span class="nav-icon">🏪</span>
            <span>المتجر</span>
        </button>
        <button class="nav-item" onclick="navigateToCompetitions()">
            <span class="nav-icon">🏆</span>
            <span>المسابقات</span>
        </button>
        <button class="nav-item" onclick="navigateToCommunity()">
            <span class="nav-icon">👥</span>
            <span>المجتمع</span>
        </button>
        <button class="nav-item" onclick="navigateToProfile()">
            <span class="nav-icon">👤</span>
            <span>الملف</span>
        </button>
    </nav>

    <!-- Import Firebase Config -->
    <script type="module" src="b-firebase-config.js"></script>

    <!-- Import API Functions -->
    <script type="module" src="b-api.js"></script>

    <!-- Import Common Functions -->
    <script type="module" src="b-common.js"></script>

    <script type="module">
        import { getGames, getAssets, getUserById } from './b-api.js';
        import { showLoading, hideLoading, showError } from './b-common.js';

        let currentFilter = 'all';
        let allResults = [];

        // Perform Search
        async function performSearch() {
            const searchTerm = document.getElementById('searchBar').value.trim();

            if (!searchTerm) {
                showError('يرجى إدخال كلمة البحث');
                return;
            }

            showLoading();
            try {
                // Search in games
                const games = await getGames();
                const gameResults = games.filter(game => 
                    game.title.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    (game.description && game.description.toLowerCase().includes(searchTerm.toLowerCase()))
                );

                // Search in assets
                const assets = await getAssets();
                const assetResults = assets.filter(asset => 
                    asset.title.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    (asset.description && asset.description.toLowerCase().includes(searchTerm.toLowerCase()))
                );

                // Combine results
                allResults = [
                    ...gameResults.map(game => ({ ...game, type: 'game' })),
                    ...assetResults.map(asset => ({ ...asset, type: 'asset' }))
                ];

                // Filter and display results
                filterAndDisplayResults();
            } catch (error) {
                console.error('Error performing search:', error);
                showError('حدث خطأ في البحث');
            } finally {
                hideLoading();
            }
        }

        // Filter and Display Results
        function filterAndDisplayResults() {
            const resultsGrid = document.getElementById('resultsGrid');
            resultsGrid.innerHTML = '';

            // Filter by type
            let filteredResults = allResults;
            if (currentFilter !== 'all') {
                filteredResults = allResults.filter(result => {
                    if (currentFilter === 'games') return result.type === 'game';
                    if (currentFilter === 'assets') return result.type === 'asset';
                    return true;
                });
            }

            if (filteredResults.length === 0) {
                resultsGrid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🔍</div>
                        <p class="empty-text">لم يتم العثور على نتائج</p>
                    </div>
                `;
                return;
            }

            // Display results
            filteredResults.forEach(result => {
                const card = createResultCard(result);
                resultsGrid.appendChild(card);
            });
        }

        // Create Result Card
        function createResultCard(result) {
            const card = document.createElement('div');
            card.className = 'result-card';
            card.onclick = () => {
                if (result.type === 'game') {
                    window.location.href = `b-game-details.html?id=${result.id}`;
                } else if (result.type === 'asset') {
                    window.location.href = `b-asset-details.html?id=${result.id}`;
                }
            };

            const typeText = result.type === 'game' ? 'لعبة' : 'أصل';
            const thumbnail = result.thumbnail || result.image || 'https://placehold.co/150x150';

            card.innerHTML = `
                <img src="${thumbnail}" alt="${result.title}" class="result-image">
                <div class="result-info">
                    <span class="result-type">${typeText}</span>
                    <div class="result-title">${result.title}</div>
                    <div class="result-meta">
                        <span>⭐ ${result.averageRating || 0}</span>
                        <span>⬇️ ${result.downloads || 0}</span>
                    </div>
                </div>
            `;

            return card;
        }

        // Filter Buttons Event Listeners
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                filterAndDisplayResults();
            });
        });

        // Search on Enter
        document.getElementById('searchBar').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                performSearch();
            }
        });
    </script>
</body>
</html>
